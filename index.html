<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aesthetic Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<img src="chimpanzee.png" class="side-image" alt="Left Image">

<div class="login-box">

<h2>Welcome Back</h2>
<p class="subtitle">Login to continue</p>

<form onsubmit="return validateLogin()">

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password" onkeyup="checkStrength()">

<p id="strength"></p>

<button type="submit">Login</button>

</form>

<p id="error"></p>

</div>

<img src="chimpanzee2.png" class="side-image" alt="Right Image">

</div>

<script src="script.js"></script>

</body>
</html>
